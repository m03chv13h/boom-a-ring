name: Build Garmin PRG

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Download and extract Garmin Connect IQ SDK
        env:
          GARMIN_SDK_URL: ${{ secrets.GARMIN_SDK_URL }}
        run: |
          if [ -z "$GARMIN_SDK_URL" ]; then
            echo "::error::GARMIN_SDK_URL secret is not set."
            echo "Garmin requires license acceptance for SDK downloads."
            echo "Please download the Connect IQ SDK zip manually and"
            echo "host it at an accessible URL, then add the URL as a"
            echo "repository secret named GARMIN_SDK_URL."
            exit 1
          fi

          echo "Downloading SDK..."
          mkdir -p "$HOME/connectiq-sdk"
          curl -fSL "$GARMIN_SDK_URL" -o /tmp/sdk.zip
          unzip -qo /tmp/sdk.zip -d "$HOME/connectiq-sdk"
          rm /tmp/sdk.zip

          # Find the bin directory (may be nested one level)
          SDK_BIN=$(find "$HOME/connectiq-sdk" -type f -name "monkeyc" -printf '%h\n' | head -1)
          if [ -z "$SDK_BIN" ]; then
            echo "::error::monkeyc not found in downloaded SDK archive."
            exit 1
          fi

          echo "SDK bin: $SDK_BIN"
          echo "$SDK_BIN" >> "$GITHUB_PATH"

      - name: Verify monkeyc is available
        run: |
          which monkeyc
          monkeyc --version || true

      - name: Generate developer key
        run: |
          mkdir -p "$HOME/.garmin"
          openssl genrsa -out "$HOME/.garmin/developer_key.pem" 4096
          openssl pkcs8 -topk8 -inform PEM -outform DER \
            -in "$HOME/.garmin/developer_key.pem" \
            -out "$HOME/.garmin/developer_key.der" -nocrypt

      - name: Build PRG
        run: |
          mkdir -p dist
          monkeyc \
            -o dist/EdgeBell.prg \
            -f monkey.jungle \
            -y "$HOME/.garmin/developer_key.der" \
            -d edge530

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: EdgeBell-prg
          path: dist/EdgeBell.prg
          if-no-files-found: error
