name: Build Garmin PRG

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.GARMIN_USERNAME }}" ] || [ -z "${{ secrets.GARMIN_PASSWORD }}" ]; then
            echo "::error::GARMIN_USERNAME and GARMIN_PASSWORD secrets must be configured. See README for setup instructions."
            exit 1
          fi

      - name: Install connect-iq-sdk-manager-cli
        run: |
          CLI_VERSION="0.8.4"
          CLI_URL="https://github.com/lindell/connect-iq-sdk-manager-cli/releases/download/v${CLI_VERSION}/connect-iq-sdk-manager-cli_${CLI_VERSION}_Linux_x86_64.tar.gz"
          echo "Downloading connect-iq-sdk-manager-cli v${CLI_VERSION}..."
          curl -fsSL "$CLI_URL" -o /tmp/ciq-cli.tar.gz
          mkdir -p "$HOME/.local/bin"
          tar -xzf /tmp/ciq-cli.tar.gz -C "$HOME/.local/bin" connect-iq-sdk-manager
          rm /tmp/ciq-cli.tar.gz
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Download Garmin Connect IQ SDK
        env:
          GARMIN_USERNAME: ${{ secrets.GARMIN_USERNAME }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        run: |
          # By using this SDK in CI, we acknowledge acceptance of the
          # Garmin Connect IQ SDK License Agreement and the Connect IQ
          # Application Developer Agreement.
          # See: https://developer.garmin.com/connect-iq/sdk/
          connect-iq-sdk-manager sdk set latest
          echo "$(connect-iq-sdk-manager sdk current-path --bin)" >> "$GITHUB_PATH"

      - name: Download device files
        env:
          GARMIN_USERNAME: ${{ secrets.GARMIN_USERNAME }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        run: |
          connect-iq-sdk-manager device download --manifest manifest.xml

      - name: Verify monkeyc is available
        run: |
          which monkeyc
          monkeyc --version || true

      - name: Generate developer key
        run: |
          mkdir -p "$HOME/.garmin"
          openssl genrsa -out "$HOME/.garmin/developer_key.pem" 4096
          openssl pkcs8 -topk8 -inform PEM -outform DER \
            -in "$HOME/.garmin/developer_key.pem" \
            -out "$HOME/.garmin/developer_key.der" -nocrypt

      - name: Build PRG
        run: |
          mkdir -p dist
          monkeyc \
            -o dist/EdgeBell.prg \
            -f monkey.jungle \
            -y "$HOME/.garmin/developer_key.der" \
            -d edge530

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: EdgeBell-prg
          path: dist/EdgeBell.prg
          if-no-files-found: error
