name: Build Garmin PRG

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecret-1-0 libwebkit2gtk-4.0-37

      - name: Download Garmin Connect IQ SDK Manager
        run: |
          # Download the official SDK Manager from Garmin
          # https://developer.garmin.com/connect-iq/sdk/
          curl -fsSL "https://developer.garmin.com/downloads/connect-iq/sdk-manager/connectiq-sdk-manager-linux.zip" \
            -o /tmp/sdk-manager.zip
          mkdir -p "$HOME/connectiq-sdk-manager"
          unzip -qo /tmp/sdk-manager.zip -d "$HOME/connectiq-sdk-manager"
          rm /tmp/sdk-manager.zip
          chmod +x "$HOME/connectiq-sdk-manager/bin/sdkmanager"

      - name: Install SDK and devices
        env:
          CIQ_SDK_ACCEPT_LICENSE: 1
        run: |
          # By using this SDK in CI, we acknowledge acceptance of the
          # Garmin Connect IQ SDK License Agreement and the Connect IQ
          # Application Developer Agreement.
          # See: https://developer.garmin.com/connect-iq/sdk/
          "$HOME/connectiq-sdk-manager/bin/sdkmanager" --headless \
            --accept-license --sdk-version=latest \
            --device=edge530 --device=edge1040

          # Find the installed SDK bin directory and add to PATH
          SDK_BIN=$(find "$HOME/.Garmin/ConnectIQ/Sdks" -type f -name "monkeyc" -printf '%h\n' 2>/dev/null | head -1)
          if [ -z "$SDK_BIN" ]; then
            # Fallback: search in the sdk-manager directory
            SDK_BIN=$(find "$HOME/connectiq-sdk-manager" -type f -name "monkeyc" -printf '%h\n' 2>/dev/null | head -1)
          fi
          if [ -z "$SDK_BIN" ]; then
            echo "::error::monkeyc not found after SDK install."
            exit 1
          fi
          echo "SDK bin: $SDK_BIN"
          echo "$SDK_BIN" >> "$GITHUB_PATH"

      - name: Verify monkeyc is available
        run: |
          which monkeyc
          monkeyc --version || true

      - name: Generate developer key
        run: |
          mkdir -p "$HOME/.garmin"
          openssl genrsa -out "$HOME/.garmin/developer_key.pem" 4096
          openssl pkcs8 -topk8 -inform PEM -outform DER \
            -in "$HOME/.garmin/developer_key.pem" \
            -out "$HOME/.garmin/developer_key.der" -nocrypt

      - name: Build PRG
        run: |
          mkdir -p dist
          monkeyc \
            -o dist/EdgeBell.prg \
            -f monkey.jungle \
            -y "$HOME/.garmin/developer_key.der" \
            -d edge530

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: EdgeBell-prg
          path: dist/EdgeBell.prg
          if-no-files-found: error
