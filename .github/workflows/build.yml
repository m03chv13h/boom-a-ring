name: Build Garmin PRG

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install connect-iq-sdk-manager-cli
        run: |
          curl -fsSL https://raw.githubusercontent.com/lindell/connect-iq-sdk-manager-cli/v0.8.4/install.sh | sudo sh -s -- -d v0.8.4

      - name: Accept Garmin SDK license agreement
        env:
          CIQ_AGREEMENT_HASH: ${{ secrets.CIQ_AGREEMENT_HASH }}
        run: |
          if [ -n "$CIQ_AGREEMENT_HASH" ]; then
            connect-iq-sdk-manager agreement accept --agreement-hash="$CIQ_AGREEMENT_HASH"
          else
            connect-iq-sdk-manager agreement accept
          fi

      - name: Login to Garmin
        env:
          GARMIN_USERNAME: ${{ secrets.GARMIN_USERNAME }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        run: |
          connect-iq-sdk-manager login

      - name: Download and set Connect IQ SDK
        run: |
          connect-iq-sdk-manager sdk set ^7.0.0
          echo "$(connect-iq-sdk-manager sdk current-path --bin)" >> "$GITHUB_PATH"

      - name: Download devices from manifest
        run: |
          connect-iq-sdk-manager device download --manifest=manifest.xml

      - name: Verify monkeyc is available
        run: |
          which monkeyc
          monkeyc --version || true

      - name: Generate developer key
        run: |
          mkdir -p "$HOME/.garmin"
          openssl genrsa -out "$HOME/.garmin/developer_key.pem" 4096
          openssl pkcs8 -topk8 -inform PEM -outform DER \
            -in "$HOME/.garmin/developer_key.pem" \
            -out "$HOME/.garmin/developer_key.der" -nocrypt

      - name: Build PRG
        run: |
          mkdir -p dist
          monkeyc \
            -o dist/EdgeBell.prg \
            -f monkey.jungle \
            -y "$HOME/.garmin/developer_key.der" \
            -d edge530

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: EdgeBell-prg
          path: dist/EdgeBell.prg
          if-no-files-found: error
