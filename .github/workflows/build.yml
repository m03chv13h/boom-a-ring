name: Build Garmin PRG

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install connect-iq-sdk-manager CLI
        run: |
          # Use the lindell/connect-iq-sdk-manager-cli tool for headless CI builds.
          # The official Garmin SDK Manager GUI no longer supports --headless mode.
          # https://github.com/lindell/connect-iq-sdk-manager-cli
          curl -fsSL "https://github.com/lindell/connect-iq-sdk-manager-cli/releases/download/v0.8.4/connect-iq-sdk-manager-cli_0.8.4_Linux_x86_64.tar.gz" \
            -o /tmp/ciq-cli.tar.gz
          sudo tar -xzf /tmp/ciq-cli.tar.gz -C /usr/local/bin connect-iq-sdk-manager
          rm /tmp/ciq-cli.tar.gz
          connect-iq-sdk-manager version

      - name: Install SDK and devices
        env:
          GARMIN_USERNAME: ${{ secrets.GARMIN_USERNAME }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        timeout-minutes: 5
        run: |
          # By using this SDK in CI, we acknowledge acceptance of the
          # Garmin Connect IQ SDK License Agreement and the Connect IQ
          # Application Developer Agreement.
          # See: https://developer.garmin.com/connect-iq/sdk/

          # Validate credentials are set to avoid browser-based OAuth fallback
          # which hangs forever in CI (http://localhost:43181/login)
          if [ -z "$GARMIN_USERNAME" ] || [ -z "$GARMIN_PASSWORD" ]; then
            echo "::error::GARMIN_USERNAME and GARMIN_PASSWORD secrets must be configured in the repository settings."
            echo "Without credentials, the SDK manager falls back to browser-based login which hangs in CI."
            exit 1
          fi

          connect-iq-sdk-manager agreement accept
          connect-iq-sdk-manager login --username="$GARMIN_USERNAME" --password="$GARMIN_PASSWORD"
          connect-iq-sdk-manager sdk set ^9.1.0
          connect-iq-sdk-manager device download --manifest=manifest.xml

          # Add SDK bin directory to PATH
          SDK_BIN=$(connect-iq-sdk-manager sdk current-path --bin)
          echo "SDK bin: $SDK_BIN"
          echo "$SDK_BIN" >> "$GITHUB_PATH"

      - name: Verify monkeyc is available
        run: |
          which monkeyc
          monkeyc --version || true

      - name: Generate developer key
        run: |
          mkdir -p "$HOME/.garmin"
          openssl genrsa -out "$HOME/.garmin/developer_key.pem" 4096
          openssl pkcs8 -topk8 -inform PEM -outform DER \
            -in "$HOME/.garmin/developer_key.pem" \
            -out "$HOME/.garmin/developer_key.der" -nocrypt

      - name: Build PRG
        run: |
          mkdir -p dist
          monkeyc \
            -o dist/EdgeBell.prg \
            -f monkey.jungle \
            -y "$HOME/.garmin/developer_key.der" \
            -d edge530

      - name: Build test PRG for edge530
        run: |
          monkeyc -t \
            -o dist/EdgeBellTest.prg \
            -f monkey.jungle \
            -y "$HOME/.garmin/developer_key.der" \
            -d edge530

      - name: Install Xvfb
        run: sudo apt-get install -y --no-install-recommends xvfb

      - name: Run unit tests on edge530 emulator
        run: |
          # Start a virtual framebuffer so the Connect IQ simulator (a Java/Swing
          # GUI application) can open its window without a real display.
          Xvfb :99 -screen 0 1280x800x24 -ac &
          export DISPLAY=:99

          # Poll until Xvfb is ready to accept connections (up to 30 s).
          for i in $(seq 1 30); do
            xdpyinfo -display :99 >/dev/null 2>&1 && { echo "Xvfb ready (${i}s)"; break; }
            sleep 1
          done
          xdpyinfo -display :99 >/dev/null 2>&1 || { echo "::error::Xvfb did not start in time"; exit 1; }

          # Start the Connect IQ simulator daemon in the background.
          connectiq &
          CONNECTIQ_PID=$!

          # Poll until the simulator process is responsive (up to 60 s).
          # The simulator writes a PID/lock file under ~/.garmin when it is ready.
          for i in $(seq 1 60); do
            kill -0 "$CONNECTIQ_PID" 2>/dev/null || { echo "::error::Connect IQ simulator exited unexpectedly"; exit 1; }
            ls "$HOME/.garmin/ConnectIQ/"*.pid 2>/dev/null && { echo "Simulator ready (${i}s)"; break; }
            sleep 1
          done

          # Execute the test binary on the edge530 emulator.
          # monkeydo exits non-zero when any unit test fails.
          monkeydo dist/EdgeBellTest.prg edge530
        timeout-minutes: 5

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: EdgeBell-prg
          path: dist/EdgeBell.prg
          if-no-files-found: error
