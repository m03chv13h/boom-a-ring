name: Build Garmin PRG

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Download Garmin Connect IQ SDK
        run: |
          echo "Fetching SDK list from Garmin..."
          SDK_JSON=$(curl -fsSL https://developer.garmin.com/downloads/connect-iq/sdks/sdks.json)

          # Get the latest Linux SDK filename from the manifest (sorted by version)
          SDK_FILE=$(echo "$SDK_JSON" | jq -r 'sort_by(.version) | last | .linux')
          if [ -z "$SDK_FILE" ] || [ "$SDK_FILE" = "null" ]; then
            echo "::error::Could not determine latest Linux SDK from sdks.json"
            exit 1
          fi

          SDK_URL="https://developer.garmin.com/downloads/connect-iq/sdks/${SDK_FILE}"
          echo "Downloading SDK: $SDK_URL"

          mkdir -p "$HOME/connectiq-sdk"
          curl -fSL "$SDK_URL" -o /tmp/sdk.zip
          unzip -qo /tmp/sdk.zip -d "$HOME/connectiq-sdk"
          rm /tmp/sdk.zip

          # Find the bin directory
          SDK_BIN=$(find "$HOME/connectiq-sdk" -type f -name "monkeyc" -printf '%h\n' | head -1)
          if [ -z "$SDK_BIN" ]; then
            echo "::error::monkeyc not found in downloaded SDK archive."
            exit 1
          fi

          echo "SDK bin: $SDK_BIN"
          echo "$SDK_BIN" >> "$GITHUB_PATH"

      - name: Accept Garmin SDK license
        run: |
          # By using this SDK in CI, we acknowledge acceptance of the
          # Garmin Connect IQ SDK License Agreement and the Connect IQ
          # Application Developer Agreement.
          # See: https://developer.garmin.com/connect-iq/sdk/
          echo "Garmin Connect IQ SDK license accepted for CI build use."

      - name: Verify monkeyc is available
        run: |
          which monkeyc
          monkeyc --version || true

      - name: Generate developer key
        run: |
          mkdir -p "$HOME/.garmin"
          openssl genrsa -out "$HOME/.garmin/developer_key.pem" 4096
          openssl pkcs8 -topk8 -inform PEM -outform DER \
            -in "$HOME/.garmin/developer_key.pem" \
            -out "$HOME/.garmin/developer_key.der" -nocrypt

      - name: Build PRG
        run: |
          mkdir -p dist
          monkeyc \
            -o dist/EdgeBell.prg \
            -f monkey.jungle \
            -y "$HOME/.garmin/developer_key.der" \
            -d edge530

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: EdgeBell-prg
          path: dist/EdgeBell.prg
          if-no-files-found: error
